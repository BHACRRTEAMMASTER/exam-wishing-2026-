<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna Devi</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: url('image1.png') no-repeat center center/cover;
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* CENTER */
.container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* GLASS CARD */
.card {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    animation: fadeIn 1.5s ease;
}

/* TEXT STYLE */
h1 {
    color: gold;
    letter-spacing: 3px;
    text-shadow: 0 0 15px gold;
}

p {
    color: #ddd;
    font-size: 18px;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, gold, orange);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.4s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px gold;
}

/* MAIN PAGE */
.main {
    display: none;
    position: relative;
    text-align: center;
    color: white;
}

.main img {
    width: 300px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 30px black;
    animation: zoomIn 1s ease;
}

/* BUTTON GROUP */
.btns button {
    display: block;
    margin: 10px auto;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes zoomIn {
    from {transform: scale(0.7);}
    to {transform: scale(1);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- WELCOME -->
<div class="container" id="welcome">
    <div class="card">
        <h1>WELCOME ❤️</h1>
        <p>Hi Miss <br><b>Krishna Devi</b><br>Aapka Swagat Hai</p>
        <button onclick="start()">Continue</button>
    </div>
</div>

<!-- MAIN -->
<div class="main" id="mainPage">
    <h1>🎉 CONGRATULATION 🎉</h1>

    <img id="mainImage" src="image1.png">

    <h2 style="color:gold;">Krishna Devi</h2>

    <div class="btns">
        <button onclick="changeImage('image1.png')">Image 1</button>
        <button onclick="changeImage('image2.png')">Image 2</button>
        <button onclick="changeImage('image3.png')">Image 3</button>
        <button onclick="saveImage()">Save</button>
    </div>
</div>

<script>
function start() {
    document.getElementById("welcome").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}

function changeImage(img) {
    document.getElementById("mainImage").src = img;
}

function saveImage() {
    alert("Saved Successfully ✅");
}
</script>

</body>
  </html>
